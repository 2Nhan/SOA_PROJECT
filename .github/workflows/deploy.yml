name: Deploy to AWS ECS (Blue/Green)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (shop, supplier, auth, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - shop
          - supplier
          - auth

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  CODEDEPLOY_APP: b2b-marketplace

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      shop: ${{ steps.changes.outputs.shop }}
      supplier: ${{ steps.changes.outputs.supplier }}
      auth: ${{ steps.changes.outputs.auth }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "shop" ]; then echo "shop=true" >> $GITHUB_OUTPUT; else echo "shop=false" >> $GITHUB_OUTPUT; fi
            if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "supplier" ]; then echo "supplier=true" >> $GITHUB_OUTPUT; else echo "supplier=false" >> $GITHUB_OUTPUT; fi
            if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "auth" ]; then echo "auth=true" >> $GITHUB_OUTPUT; else echo "auth=false" >> $GITHUB_OUTPUT; fi
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          if echo "$CHANGED" | grep -q "^shared/"; then
            echo "shop=true" >> $GITHUB_OUTPUT
            echo "supplier=true" >> $GITHUB_OUTPUT
            echo "auth=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if echo "$CHANGED" | grep -q "^microservices/shop/"; then echo "shop=true" >> $GITHUB_OUTPUT; else echo "shop=false" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q "^microservices/supplier/"; then echo "supplier=true" >> $GITHUB_OUTPUT; else echo "supplier=false" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q "^microservices/auth/"; then echo "auth=true" >> $GITHUB_OUTPUT; else echo "auth=false" >> $GITHUB_OUTPUT; fi

  # ──────────────────────────────────────────────
  # Deploy Jobs (Corrected Family Names)
  # ──────────────────────────────────────────────

  deploy-shop:
    name: Deploy Shop Service
    needs: detect-changes
    if: needs.detect-changes.outputs.shop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t shop -f ./microservices/shop/docker/Dockerfile .
          docker tag shop:latest $ECR_REGISTRY/shop:${{ github.sha }}
          docker push $ECR_REGISTRY/shop:${{ github.sha }}

      - name: Update and Register Task Definition
        id: taskdef
        run: |
          # Use 'shop' family name
          aws ecs describe-task-definition --task-definition shop --query 'taskDefinition' > temp-td.json
          
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | 
             .containerDefinitions[0].image = "${{ steps.ecr-login.outputs.registry }}/shop:${{ github.sha }}" |
             .containerDefinitions[0].environment |= (map(select(.name != "SESSION_DB_NAME")) + [{"name": "SESSION_DB_NAME", "value": "auth_db"}])' \
             temp-td.json > final-td.json

          TASKDEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://final-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$TASKDEF_ARN" >> $GITHUB_OUTPUT

      - name: Deploy via CodeDeploy
        run: |
          cp deployment/appspec-shop.yaml /tmp/appspec-shop.yaml
          sed -i "s|<TASK_DEFINITION>|${{ steps.taskdef.outputs.arn }}|g" /tmp/appspec-shop.yaml
          aws s3 cp /tmp/appspec-shop.yaml s3://${{ env.S3_BUCKET }}/deploy/appspec-shop.yaml

          aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APP }} \
            --deployment-group-name b2b-shop-dg \
            --s3-location bucket=${{ env.S3_BUCKET }},key=deploy/appspec-shop.yaml,bundleType=YAML

  deploy-supplier:
    name: Deploy Supplier Service
    needs: detect-changes
    if: needs.detect-changes.outputs.supplier == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t supplier -f ./microservices/supplier/docker/Dockerfile .
          docker tag supplier:latest $ECR_REGISTRY/supplier:${{ github.sha }}
          docker push $ECR_REGISTRY/supplier:${{ github.sha }}

      - name: Update and Register Task Definition
        id: taskdef
        run: |
          # Use 'supplier' family name
          aws ecs describe-task-definition --task-definition supplier --query 'taskDefinition' > temp-td.json
          
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | 
             .containerDefinitions[0].image = "${{ steps.ecr-login.outputs.registry }}/supplier:${{ github.sha }}" |
             .containerDefinitions[0].environment |= (map(select(.name != "SESSION_DB_NAME")) + [{"name": "SESSION_DB_NAME", "value": "auth_db"}])' \
             temp-td.json > final-td.json

          TASKDEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://final-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$TASKDEF_ARN" >> $GITHUB_OUTPUT

      - name: Deploy via CodeDeploy
        run: |
          cp deployment/appspec-supplier.yaml /tmp/appspec-supplier.yaml
          sed -i "s|<TASK_DEFINITION>|${{ steps.taskdef.outputs.arn }}|g" /tmp/appspec-supplier.yaml
          aws s3 cp /tmp/appspec-supplier.yaml s3://${{ env.S3_BUCKET }}/deploy/appspec-supplier.yaml

          aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APP }} \
            --deployment-group-name b2b-supplier-dg \
            --s3-location bucket=${{ env.S3_BUCKET }},key=deploy/appspec-supplier.yaml,bundleType=YAML

  deploy-auth:
    name: Deploy Auth Service
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t auth -f ./microservices/auth/docker/Dockerfile .
          docker tag auth:latest $ECR_REGISTRY/auth:${{ github.sha }}
          docker push $ECR_REGISTRY/auth:${{ github.sha }}

      - name: Update and Register Task Definition
        id: taskdef
        run: |
          # Use 'auth' family name
          aws ecs describe-task-definition --task-definition auth --query 'taskDefinition' > temp-td.json
          
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | 
             .containerDefinitions[0].image = "${{ steps.ecr-login.outputs.registry }}/auth:${{ github.sha }}" |
             .containerDefinitions[0].environment |= (map(select(.name != "SESSION_DB_NAME")) + [{"name": "SESSION_DB_NAME", "value": "auth_db"}])' \
             temp-td.json > final-td.json

          TASKDEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://final-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$TASKDEF_ARN" >> $GITHUB_OUTPUT

      - name: Deploy via CodeDeploy
        run: |
          cp deployment/appspec-auth.yaml /tmp/appspec-auth.yaml
          sed -i "s|<TASK_DEFINITION>|${{ steps.taskdef.outputs.arn }}|g" /tmp/appspec-auth.yaml
          aws s3 cp /tmp/appspec-auth.yaml s3://${{ env.S3_BUCKET }}/deploy/appspec-auth.yaml

          aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APP }} \
            --deployment-group-name b2b-auth-dg \
            --s3-location bucket=${{ env.S3_BUCKET }},key=deploy/appspec-auth.yaml,bundleType=YAML
